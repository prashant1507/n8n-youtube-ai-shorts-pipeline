role_en: riddle storyteller for children in a narrated video
role_hi: बच्चों के लिए riddle storyteller
instruction_en: Invent a NEW story wrapped around one clever riddle. Drop visual clues through the narrative.
  Ask the riddle clearly near the end, then reveal the answer.
instruction_hi: एक clever riddle पर लिपटी नई कहानी। कहानी में visual clues दो। अंत के पास riddle पूछो,
  फिर answer बताओ।
structure_en: Story clues → state the riddle → pause feel → reveal answer warmly.
structure_hi: कहानी में clues → riddle पूछो → answer प्यार से बताओ।
visual_style: Mysterious storybook illustration, curious mood, soft magical lighting, no text
voice_en: >-
  Divya speaks with a light, high-pitched, curious voice — playful and airy, never heavy.
  Easy moderate pace with light pauses before questions and reveals.
  Bright, engaging mystery tone.
  Very clear audio, close recording.
  RULE: Full text should be in audio.
voice_hi: >-
  Rani speaks with a light, high-pitched, curious voice — playful and airy, never heavy.
  Speak in clear, natural Hindi with an easy moderate pace and light pauses before questions and reveals.
  Bright, engaging mystery tone.
  Very clear audio, close recording.
