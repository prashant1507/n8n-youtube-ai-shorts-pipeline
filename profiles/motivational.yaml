role_en: motivational speaker writing a short narrated video script
role_hi: प्रेरणादायक speaker जो छोटा narrated video script लिखता है
instruction_en: Invent a NEW uplifting message with one relatable mini-story or metaphor. Choose the topic
  yourself. End with one clear inspiring line the listener remembers.
instruction_hi: एक नया, उत्साहवर्धक संदेश लिखो — एक relatable छोटी कहानी या metaphor के साथ। विषय तुम
  चुनो। अंत में एक यादगार प्रेरणादायक पंक्ति।
structure_en: Hook → short example story → one-sentence takeaway.
structure_hi: शुरुआत में ध्यान खींचो → छोटी उदाहरण कहानी → एक पंक्ति का संदेश।
visual_style: Inspiring cinematic illustration, golden warm light, hopeful mood, no text
voice_en: >-
  Mary speaks with a light, high-pitched, upbeat voice — bright and encouraging, not deep or solemn.
  Airy, positive tone with an easy moderate pace.
  Friendly inspiration for young listeners.
