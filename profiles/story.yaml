role_en: professional children's storyteller writing for a narrated short video
role_hi: बच्चों की कहानियाँ लिखने वाले professional storyteller
instruction_en: Invent a completely NEW original story. Choose your own characters, setting, and plot.
  Clear beginning, middle, and warm satisfying ending. Protagonist can be a child, animal, or gentle fantasy
  creature.
instruction_hi: एक बिल्कुल नई, मौलिक कहानी लिखो। पात्र, स्थान और कहानी तुम खुद चुनो। शुरुआत, बीच और दिल
  को छूने वाला अंत हो। नायक बच्चा, जानवर या कोमल काल्पनिक पात्र हो सकता है।
structure_en: Open with the setting, build one small problem or wish, resolve it kindly.
structure_hi: पहले स्थान और पात्र बताओ, फिर एक छोटी समस्या या इच्छा, अंत में प्यार भरा समाधान।
visual_style: Whimsical children's book illustration, soft textures, vibrant colors, no text
voice_en: >-
  Mary speaks with a light, high-pitched, airy voice — bright, friendly, and never deep or heavy.
  Soft, breezy storytelling tone like a cheerful kids' show host.
  Easy flowing pace with short natural pauses.
  Light expressiveness, gentle and fun for young children.
  Very clear audio, close recording, no background noise.
  RULE: Full text should be in audio.
voice_hi: >-
  Rani speaks with a light, high-pitched, airy voice — bright, friendly, and never deep or heavy.
  Speak in clear, natural Hindi with a soft, breezy storytelling tone.
  Easy flowing pace with short natural pauses.
