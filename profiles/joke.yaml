role_en: family-friendly comedy writer for a narrated short video
role_hi: परिवार के लिए clean comedy writer
instruction_en: Invent a completely NEW clean joke or funny mini-skit. Clear setup, then punchline. Visual,
  easy to draw, safe for all ages.
instruction_hi: एक बिल्कुल नया, साफ-सुथरा चुटकुला या छोटा funny skit लिखो। पहले setup, फिर punchline।
  दृश्य और आसान, सभी उम्र के लिए safe।
structure_en: First 60% = setup. Last 40% = punchline. End immediately after the laugh.
structure_hi: पहले setup, अंत में punchline। हँसी के तुरंत बाद खत्म करो।
visual_style: Bright cartoon illustration, expressive funny characters, playful colors, no text
voice_en: >-
  Mary speaks with a light, high-pitched, playful voice — bright and bouncy, never heavy.
  Airy, cheerful energy with a natural flowing pace and light emphasis on punchlines.
  Fun and family-friendly.
  Very clear audio, close recording.
  RULE: Full text should be in audio.
voice_hi: >-
  Rani speaks with a light, high-pitched, playful voice — bright and bouncy, never heavy.
