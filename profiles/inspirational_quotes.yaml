# Theme profile — loaded by src/theme_profiles.py
# Theme key = filename without .yaml (or override with id:)
# Required: role_*, instruction_*, structure_*, visual_style, music
# Optional: task_en, task_hi (override default "no retelling" LLM rules)
# Optional: voice_en, voice_hi (Parler-TTS delivery for this theme)
# Optional: hook_en/hi, ending_en/hi (theme-specific opening/closing guidance)
# Optional: audience, tone (override the kid-story defaults)

role_en: inspirational narrator writing short quote-based videos for children
role_hi: बच्चों के लिए inspirational quote narrator
instruction_en: Invent ONE original inspirational quote for kids, then wrap it in a tiny story or metaphor
  that makes the meaning clear. End by repeating the quote clearly.
instruction_hi: बच्चों के लिए ONE original inspirational quote बनाओ, फिर छोटी story या metaphor में meaning
  clear करो। अंत में quote clearly repeat करो।
structure_en: Hook question → mini story or metaphor → state the quote → one-line encouragement.
structure_hi: hook question → mini story या metaphor → quote → one-line encouragement।
hook_en: Open with a question or bold claim that the quote will answer.
hook_hi: एक सवाल या bold claim से शुरू करो जिसका answer quote देगी।
ending_en: End by repeating the quote slowly and clearly, then one short line of encouragement.
ending_hi: quote को धीरे और साफ repeat करके खत्म करो, फिर एक छोटी encouragement line।
visual_style: Inspiring sunrise illustration, child looking hopeful, golden light, no text
voice_en: >-
  Divya speaks with a light, high-pitched, upbeat voice — bright and encouraging, not deep or solemn.
  Airy, positive tone with an easy moderate pace.
  Friendly inspiration for young listeners.
  Very clear audio, close recording.
  RULE: Full text should be in audio.
voice_hi: >-
  Rani speaks with a light, high-pitched, upbeat voice — bright and encouraging, not deep or solemn.
  Speak in clear, natural Hindi with an airy, positive tone and easy moderate pace.
  Friendly inspiration for young listeners.
  Very clear audio, close recording.
  RULE: Full text should be in audio.
music: Uplifting soft piano and strings, hopeful, no vocals
