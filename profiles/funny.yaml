role_en: viral short-form comedy writer for a narrated video
role_hi: funny short video के लिए comedy writer
instruction_en: Invent a NEW silly or absurd scenario that builds to one hilarious visual moment. Exaggerated
  and playful. Safe for children. Not a traditional joke — more of a funny situation.
instruction_hi: एक नया silly या absurd situation लिखो जो एक hilarious visual moment पर पहुँचे। बढ़ा-चढ़ाकर
  और playful। बच्चों के लिए safe।
structure_en: Describe odd situation → things get sillier → big funny visual payoff at the end.
structure_hi: अजीब situation → और silly → अंत में बड़ा funny visual moment।
hook_en: Open inside the absurd situation, already strange and getting sillier.
hook_hi: absurd situation के अंदर से शुरू करो, पहले से अजीब और और silly होता हुआ।
ending_en: End on the big funny visual payoff. Stop right after the laugh.
ending_hi: बड़े funny visual payoff पर खत्म करो। हँसी के तुरंत बाद रुक जाओ।
visual_style: Vibrant cartoon scene, exaggerated expressions, silly humor, colorful, no text
voice_en: >-
  Divya speaks with a light, high-pitched, playful voice — bright and bouncy, never heavy.
  Airy, cheerful energy with a natural flowing pace and light emphasis on punchlines.
  Fun and family-friendly.
  Very clear audio, close recording.
  RULE: Full text should be in audio.
voice_hi: >-
  Rani speaks with a light, high-pitched, playful voice — bright and bouncy, never heavy.
  Speak in clear, natural Hindi with airy, cheerful energy and a natural flowing pace.
  Light emphasis on punchlines.
  Fun and family-friendly.
  Very clear audio, close recording.
  RULE: Full text should be in audio.
music: Upbeat quirky fun music, comedic timing, no vocals
