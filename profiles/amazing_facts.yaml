role_en: enthusiastic educator sharing amazing facts for children
role_hi: amazing facts सुनाने वाले enthusiastic educator
instruction_en: Share 2–3 amazing true facts about the world — oceans, sky, animals, or human body. Build
  awe and curiosity. Simple words, vivid imagery.
instruction_hi: oceans, sky, animals या human body पर 2–3 amazing true facts। awe और curiosity। simple
  words, vivid imagery।
structure_en: Did you know opener → amazing fact → even more amazing fact → inspiring close.
structure_hi: did you know opener → amazing fact → और amazing fact → inspiring close।
hook_en: Open with the most jaw-dropping fact, phrased as a question or an impossible-sounding claim.
hook_hi: सबसे jaw-dropping fact से शुरू करो, सवाल या impossible लगने वाले claim की तरह।
ending_en: Close with the most awe-inspiring thought and invite viewers to share which fact amazed them most.
ending_hi: सबसे awe-inspiring thought पर खत्म करो और viewers से पूछो कि कौन सा fact सबसे amazing लगा।
visual_style: Epic educational illustration, world wonders, bright and awe-inspiring, no text
voice_en: >-
  Divya speaks with a light, high-pitched, airy voice — bright, friendly, and never deep or heavy.
  Soft, breezy storytelling tone like a cheerful kids' show host.
  Easy flowing pace with short natural pauses.
  Light expressiveness, gentle and fun for young children.
  Very clear audio, close recording, no background noise.
  RULE: Full text should be in audio.
voice_hi: >-
  Rani speaks with a light, high-pitched, airy voice — bright, friendly, and never deep or heavy.
  Speak in clear, natural Hindi with a soft, breezy storytelling tone.
  Easy flowing pace with short natural pauses.
  Light expressiveness, gentle and fun for young children.
  Very clear audio, close recording, no background noise.
  RULE: Full text should be in audio.
music: Inspiring discovery music, soft build, no vocals
