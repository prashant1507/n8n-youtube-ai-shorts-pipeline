# Pipeline configuration — all settings live here (src/config.py has no fallback defaults).
# Voice profile is fixed for indic-parler-tts — do not let the LLM override this.
# --theme is optional; omit or use "auto" for serial rotation through themes below.

theme: ""
language: "en"          # en | hi
duration_sec: 60        # 30-60
tone: "warm, storytelling, child-friendly"
subtitles: true

# Retention touches for the Shorts feed (burned on-screen).
shorts:
  hook_overlay: true          # burn the LLM hook_text big on the first seconds of the video
  hook_overlay_sec: 2.5       # how long the on-screen hook stays up
  caption_chunk_words: 4      # short punchy captions; set 0 for full-sentence captions (legacy)
  caption_font_scale: 1.35    # bigger than the old bottom subtitle bar
  caption_y_ratio: 0.72       # 0 = top, 1 = bottom; ~0.72 sits in the lower third
  loop_transition: true       # cross-dissolve the ending back to the opening for seamless replays
  loop_transition_sec: 0.4

# Content types for --theme / random selection. Add new names here.
# Unknown theme names still work via a generic fallback profile.
themes:
  - story
  - joke
  - motivational
  - funny
  - adventure
  - bedtime
  - riddle
  - friendship
  - fantasy
  - sci-fi
  - comedy
  - superhero
  - pirate
  - ninja
  - samurai
  - space
  - time travel
  - magic
  - dragons
  - dinosaurs
  - robots
  - aliens
  - animals
  - pets
  - inspirational quotes


voice:
  # Parler-TTS voice description — passed to description_tokenizer, NOT the narration text.
  description: >-
    A female speaker named Divya with a warm, melodic, and animated voice.
    Speak in a warm, gentle, expressive storytelling voice, like a caring teacher reading to young children.
    Maintain a slow, clear pace with natural pauses after important sentences and slightly longer pauses before surprises.
    Vary pitch and intonation for characters and events, keeping narration smooth and pleasant.
    Keep the tone cozy, engaging, and uplifting — calm for gentle stories, a bit more energy for funny or adventure scenes.
    RULE: Full text should be in audio.
  model: "ai4bharat/indic-parler-tts"
  device: "mps"

music:
  model: "facebook/musicgen-small"
  prompt: "Soft ambient music, gentle and calm, no vocals, bedtime story atmosphere"
  volume: 0.16

video:
  tier: "flux"          # flux | wan
  aspect_ratio: "9:16"
  resolution: "1080x1920"
  scenes_count: 6
  style_anchor: "3D Pixar-style animation, vibrant colors, cinematic lighting, high detail"
  style_suffix: "3D Pixar-style animation, vibrant colors, cinematic lighting, high detail"
  flux_model: "black-forest-labs/FLUX.2-klein-4B"
  flux_steps: 25
  flux_guidance: 3.5
  flux_max_sequence_length: 256
  flux_gen_width: 512   # generate size (9:16); upscaled to resolution in Ken Burns
  flux_gen_height: 912
  flux_python: ""       # auto: project image-venv (see requirements-image.txt)
  flux_local_files_only: true
  flux_reference_mode: "first"   # first = same characters (scene 1 anchor); chain = max similarity; none = no anchor
  flux_cpu_offload: true        # true = lower peak RAM, slower (CUDA/MPS via accelerate)
  motion_zoom: 0.18
  motion_supersample: 1.5         # 2.0 = sharper Ken Burns but more RAM; 1.0 = lowest
  ken_burns_fps: 30
  wan_model: "models/wan2.2-ti2v-5b"

llm:
  base_url: "http://127.0.0.1:1234/v1"
  model: "meta-llama-3.1-8b-instruct"
  temperature: 0.8
  auto_select_model: true
  quality:
    enabled: true          # LLM reviewer validates + revises story and image prompts
    min_score: 6           # accept when score >= this (1-10)
    max_revisions: 2       # revise attempts per stage when score is low
    temperature: 0.3       # lower temp for review/revise (generation uses temperature above)
  seo:
    enabled: true          # generate YouTube title variants, description, tags for reach/CTR
    title_variants: 5      # how many candidate titles the LLM proposes (best one is chosen)
    max_title_chars: 90    # keep titles short enough to show fully in the Shorts feed
    max_tags: 15           # number of SEO tags to attach on upload
    temperature: 0.7       # a little creativity for punchy titles
